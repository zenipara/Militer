name: GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate production frontend environment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY tidak ditemukan di Secrets maupun Variables."
            echo "Pastikan sudah ditambahkan di: GitHub → Settings → Secrets and variables → Actions"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_URL"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Resolve GitHub Pages base path
        id: pages_base
        uses: actions/github-script@v7
        with:
          script: |
            const pages = await github.request('GET /repos/{owner}/{repo}/pages', {
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const htmlUrl = pages.data?.html_url;
            let basePath = `/${context.repo.repo}/`;

            if (htmlUrl) {
              const parsed = new URL(htmlUrl);
              const pathname = parsed.pathname || '/';
              basePath = pathname.endsWith('/') ? pathname : `${pathname}/`;
            }

            core.info(`Resolved VITE_BASE_PATH=${basePath}`);
            core.setOutput('basePath', basePath);

      - name: Build production bundle
        env:
          VITE_BASE_PATH: ${{ steps.pages_base.outputs.basePath }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Create SPA fallback
        run: cp public/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
