name: GitHub Pages Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy-pages:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply Supabase migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN || vars.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF || vars.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD || vars.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ] || [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "⚠️  Supabase migration secrets tidak lengkap (SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF, SUPABASE_DB_PASSWORD)."
            echo "   Migration dilewati. Tambahkan ketiga secret tersebut di GitHub → Settings → Secrets and variables → Actions."
            echo "   Build frontend tetap dilanjutkan."
            exit 0
          fi
          set +e
          npx supabase@latest link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD" --yes
          LINK_EXIT=$?
          if [ $LINK_EXIT -ne 0 ]; then
            echo "::warning::Supabase link gagal (cek SUPABASE_PROJECT_REF/SUPABASE_DB_PASSWORD). Build frontend tetap dilanjutkan."
            exit 0
          fi
          npx supabase@latest db push --password "$SUPABASE_DB_PASSWORD" --yes
          PUSH_EXIT=$?
          if [ $PUSH_EXIT -ne 0 ]; then
            echo "::warning::Supabase db push gagal (cek SUPABASE_DB_PASSWORD). Build frontend tetap dilanjutkan."
            exit 0
          fi

      - name: Validate production frontend environment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY tidak ditemukan di Secrets maupun Variables."
            echo "Pastikan sudah ditambahkan di: GitHub → Settings → Secrets and variables → Actions"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_URL"
            echo "  • Tab 'Secrets' → secret name: VITE_SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Build production bundle
        env:
          VITE_BASE_PATH: /v/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Create SPA fallback
        run: cp public/404.html dist/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
