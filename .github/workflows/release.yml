name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  # ── Gate 1: Validate version tag matches package.json ────────────────────────
  validate-version:
    name: Validate Release Version
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "❌ Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)."
            echo "Update package.json version to match the tag before releasing."
            exit 1
          fi
          echo "✅ Version match: v$PKG_VERSION"

  # ── Gate 2: Full CI (lint + type-check + test + build) ───────────────────────
  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: validate-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Unit tests
        run: npm test

      - name: Build production bundle
        env:
          VITE_BASE_PATH: /v/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || vars.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ -z "$VITE_SUPABASE_ANON_KEY" ]; then
            echo "❌ VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY tidak ditemukan di Secrets maupun Variables."
            exit 1
          fi
          npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  # ── Gate 3: Create GitHub Release ─────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/,/^## \[/" CHANGELOG.md | head -n -1 | tail -n +2)
          if [ -z "$NOTES" ]; then
            NOTES="Lihat [CHANGELOG.md](./CHANGELOG.md) untuk detail perubahan."
          fi
          # Write to a temp file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: KARYO OS ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
